<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 我们的623</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #fff5f0; font-family: 'Segoe UI', sans-serif; }

.ui-overlay {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 100; text-align: center; pointer-events: none;
}
.ui-overlay h1 {
  font-size: 26px; color: #ff9ec4; text-shadow: 0 0 20px rgba(255,150,180,0.3);
  letter-spacing: 4px; margin-bottom: 2px;
}
.ui-overlay .time { font-size: 14px; color: #c9a0ff; }

.controls {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  z-index: 100; display: flex; gap: 10px;
}
.controls button {
  background: rgba(255,255,255,0.85); border: 1px solid rgba(255,158,196,0.4);
  color: #ff9ec4; padding: 8px 18px; border-radius: 20px; cursor: pointer;
  font-size: 13px; backdrop-filter: blur(10px); transition: all 0.3s;
  box-shadow: 0 2px 8px rgba(255,158,196,0.15);
}
.controls button:hover { background: rgba(255,150,180,0.2); transform: translateY(-2px); }

.info-panel {
  position: fixed; top: 50%; right: 20px; transform: translateY(-50%);
  z-index: 100; display: flex; flex-direction: column; gap: 6px;
}
.info-item {
  background: rgba(255,255,255,0.9); border: 1px solid rgba(255,158,196,0.3);
  border-radius: 12px; padding: 8px 14px; color: #666; font-size: 12px;
  backdrop-filter: blur(10px); cursor: pointer; transition: all 0.3s;
  box-shadow: 0 2px 6px rgba(255,158,196,0.1);
}
.info-item:hover { background: rgba(255,255,255,1); transform: scale(1.05); box-shadow: 0 4px 12px rgba(255,158,196,0.2); }
.info-item .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

/* 人物卡片弹窗 */
.char-card {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
  z-index: 200; background: rgba(255,255,255,0.97); border-radius: 20px;
  padding: 30px; min-width: 280px; text-align: center;
  box-shadow: 0 10px 40px rgba(255,158,196,0.3);
  border: 2px solid rgba(255,158,196,0.2);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.char-card.show { transform: translate(-50%, -50%) scale(1); }
.char-card .card-avatar {
  width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 12px;
  display: flex; align-items: center; justify-content: center; font-size: 28px;
}
.char-card h3 { font-size: 20px; margin-bottom: 6px; }
.char-card .catchphrase {
  font-size: 14px; color: #999; margin-bottom: 10px; font-style: italic;
}
.char-card .card-items { font-size: 13px; color: #888; margin-bottom: 4px; }
.char-card .close-btn {
  margin-top: 14px; background: rgba(255,158,196,0.15); border: none;
  color: #ff9ec4; padding: 6px 20px; border-radius: 15px; cursor: pointer; font-size: 13px;
}
.char-card .close-btn:hover { background: rgba(255,158,196,0.3); }

/* 留言板 */
.message-board {
  position: fixed; bottom: 80px; right: 20px; z-index: 100;
  background: rgba(255,255,255,0.95); border-radius: 16px;
  padding: 16px; width: 240px; max-height: 300px;
  box-shadow: 0 4px 20px rgba(255,158,196,0.2);
  border: 1px solid rgba(255,158,196,0.2);
  display: none;
}
.message-board.show { display: block; }
.message-board h4 { font-size: 14px; color: #ff9ec4; margin-bottom: 8px; }
.message-board .msg-list { max-height: 160px; overflow-y: auto; margin-bottom: 8px; }
.message-board .msg-item { font-size: 12px; color: #666; padding: 4px 0; border-bottom: 1px solid #f5f0f0; }
.message-board .msg-item span { color: #c9a0ff; font-weight: bold; }
.message-board input {
  width: 100%; padding: 6px 10px; border: 1px solid #f0d6e0; border-radius: 10px;
  font-size: 12px; outline: none;
}
.message-board input:focus { border-color: #ff9ec4; }

.loading {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #fff5f0; display: flex; align-items: center; justify-content: center;
  flex-direction: column; z-index: 999; transition: opacity 0.8s;
}
.loading h2 { color: #ff9ec4; font-size: 22px; margin-bottom: 16px; }
.loading .bar { width: 200px; height: 3px; background: rgba(255,158,196,0.2); border-radius: 2px; overflow: hidden; }
.loading .bar-inner { width: 0%; height: 100%; background: linear-gradient(90deg, #ff9ec4, #c9a0ff); border-radius: 2px; transition: width 0.3s; }
</style>
</head>
<body>

<div class="loading" id="loading">
  <h2>🏠 正在布置623...</h2>
  <div class="bar"><div class="bar-inner" id="loadBar"></div></div>
</div>

<div class="ui-overlay">
  <h1>🏠 我们的623</h1>
  <p class="time" id="clock"></p>
</div>

<div class="controls">
  <button onclick="toggleDayNight()">🌙 日/夜</button>
  <button onclick="resetCamera()">📷 复位</button>
  <button onclick="toggleHearts()">💕 爱心</button>
  <button onclick="toggleMsgBoard()">📝 留言</button>
</div>

<div class="info-panel" id="infoPanel"></div>

<div class="char-card" id="charCard">
  <div class="card-avatar" id="cardAvatar"></div>
  <h3 id="cardName"></h3>
  <div class="catchphrase" id="cardPhrase"></div>
  <div class="card-items" id="cardDesk"></div>
  <div class="card-items" id="cardPlushie"></div>
  <button class="close-btn" onclick="closeCard()">知道了 ✨</button>
</div>

<div class="message-board" id="msgBoard">
  <h4>📝 623留言板</h4>
  <div class="msg-list" id="msgList"></div>
  <input id="msgInput" placeholder="写点什么..." onkeydown="if(event.key==='Enter')sendMsg()">
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/three.js/r128/three.min.js"></script>
<script src="OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let isNight = false, heartsOn = true;
let mouse = new THREE.Vector2(0, 0);
let characters = [];
let hearts = [];
let starLights = [];
let deskLamps = [];
let sunbeams = [];
let roomGroup;
let clock = new THREE.Clock();
let hoveredChar = null;

const dormData = [
  { name: '婷婷', side: 'left', index: 0, color: 0x7ec8e3, colorHex: '#7ec8e3', deskItems: '课本+笔筒', bedItem: '小熊玩偶', catchphrase: '好好好', emoji: '📚' },
  { name: '双双', side: 'left', index: 1, color: 0xff9ec4, colorHex: '#ff9ec4', deskItems: '笔记本电脑+咖啡杯', bedItem: '猫咪抱枕', catchphrase: '底层逻辑优先', emoji: '💻' },
  { name: '年年', side: 'left', index: 2, color: 0xffa07a, colorHex: '#ffa07a', deskItems: '平板+耳机', bedItem: '兔子玩偶', catchphrase: 'master', emoji: '🎮' },
  { name: '小雅', side: 'right', index: 0, color: 0x7ecba1, colorHex: '#7ecba1', deskItems: '平板+水杯', bedItem: '星星抱枕', catchphrase: '我是主人', emoji: '👑' },
  { name: '妹儿', side: 'right', index: 1, color: 0xc9a0ff, colorHex: '#c9a0ff', deskItems: '化妆镜+耳机', bedItem: '兔子玩偶', catchphrase: '好看就行', emoji: '💄' },
  { name: '云云', side: 'right', index: 2, color: 0xffcc80, colorHex: '#ffcc80', deskItems: '手机支架+零食', bedItem: '熊猫抱枕', catchphrase: '先吃再说', emoji: '🐼' },
];

const messages = [
  { name: '婷婷', text: '今晚吃什么好好好' },
  { name: '云云', text: '先吃再说！' },
  { name: '双双', text: '底层逻辑是…谁洗碗' },
];

// === 初始化 ===
function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0xfff5f0, 0.008);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(12, 10, 14);
  camera.lookAt(0, 1, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.6;
  renderer.setClearColor(0xfff5f0);
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.maxPolarAngle = Math.PI / 2.2;
  controls.minDistance = 6;
  controls.maxDistance = 25;
  controls.target.set(0, 1, 0);

  roomGroup = new THREE.Group();
  scene.add(roomGroup);

  buildRoom();
  buildBeds();
  buildCharacters();
  buildDecorations();
  setupLights();
  buildHearts();
  buildSunbeam();
  buildInfoPanel();
  updateClock();
  setInterval(updateClock, 1000);
  loadMessages();

  window.addEventListener('resize', onResize);
  window.addEventListener('mousemove', onMouseMove);
  renderer.domElement.addEventListener('click', onClick);

  setTimeout(() => {
    document.getElementById('loading').style.opacity = '0';
    setTimeout(() => document.getElementById('loading').style.display = 'none', 800);
  }, 800);

  animate();
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}

// === 构建房间 ===
function buildRoom() {
  // 地板 - 浅木色
  const floorGeo = new THREE.BoxGeometry(16, 0.15, 10);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.7 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.position.y = -0.075;
  floor.receiveShadow = true;
  roomGroup.add(floor);

  // 木地板纹
  for (let i = -7; i <= 7; i += 0.8) {
    const lineGeo = new THREE.BoxGeometry(0.02, 0.01, 10);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xc9a87c });
    const line = new THREE.Mesh(lineGeo, lineMat);
    line.position.set(i, 0.005, 0);
    roomGroup.add(line);
  }

  // 后墙 - 奶白
  const wallGeo = new THREE.BoxGeometry(16, 6, 0.15);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xfaf0e6, roughness: 0.9 });
  const backWall = new THREE.Mesh(wallGeo, wallMat);
  backWall.position.set(0, 3, -5);
  backWall.receiveShadow = true;
  roomGroup.add(backWall);

  // 左墙
  const sideWallGeo = new THREE.BoxGeometry(0.15, 6, 10);
  const leftWall = new THREE.Mesh(sideWallGeo, wallMat);
  leftWall.position.set(-8, 3, 0);
  roomGroup.add(leftWall);

  // 右墙
  const rightWall = new THREE.Mesh(sideWallGeo, wallMat);
  rightWall.position.set(8, 3, 0);
  roomGroup.add(rightWall);

  // 窗户
  const wfGeo = new THREE.BoxGeometry(4, 3, 0.2);
  const wf = new THREE.Mesh(wfGeo, new THREE.MeshStandardMaterial({ color: 0xadd8e6, transparent: true, opacity: 0.4, roughness: 0.1, metalness: 0.3 }));
  wf.position.set(0, 3.5, -4.9);
  roomGroup.add(wf);
  const frameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
  const crossH = new THREE.Mesh(new THREE.BoxGeometry(4, 0.08, 0.25), frameMat);
  crossH.position.set(0, 3.5, -4.85);
  roomGroup.add(crossH);
  const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.08, 3, 0.25), frameMat);
  crossV.position.set(0, 3.5, -4.85);
  roomGroup.add(crossV);

  // 白色薄纱窗帘
  const curtainMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.4, side: THREE.DoubleSide, roughness: 0.9 });
  const curtainL = new THREE.Mesh(new THREE.BoxGeometry(2.2, 3.5, 0.05), curtainMat);
  curtainL.position.set(-1.2, 3.5, -4.6);
  roomGroup.add(curtainL);
  const curtainR = new THREE.Mesh(new THREE.BoxGeometry(2.2, 3.5, 0.05), curtainMat);
  curtainR.position.set(1.2, 3.5, -4.6);
  roomGroup.add(curtainR);

  // 窗台多肉盆栽
  buildSucculent(0, 2.1, -4.7);
  buildSucculent(1.5, 2.1, -4.7);
  buildSucculent(-1.5, 2.1, -4.7);

  // 照片墙（3个相框）
  buildPhotoFrame(-3, 4, -4.88);
  buildPhotoFrame(0, 4.2, -4.88);
  buildPhotoFrame(3, 4, -4.88);

  // 门牌号623
  const doorPlateGroup = new THREE.Group();
  const plateBg = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 0.05), new THREE.MeshStandardMaterial({ color: 0xff9ec4, roughness: 0.5 }));
  doorPlateGroup.add(plateBg);
  // 数字623用小方块拼
  const numMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  // 简化：用一个小平面代表文字
  const numPlane = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.3, 0.06), numMat);
  numPlane.position.z = 0.02;
  doorPlateGroup.add(numPlane);
  doorPlateGroup.position.set(6.5, 4.5, -4.88);
  roomGroup.add(doorPlateGroup);

  // 小黑板
  const boardGroup = new THREE.Group();
  const boardFrame = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.1, 0.08), new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.6 }));
  boardGroup.add(boardFrame);
  const boardSurface = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.9, 0.04), new THREE.MeshStandardMaterial({ color: 0x2d3a2d, roughness: 0.9 }));
  boardSurface.position.z = 0.04;
  boardGroup.add(boardSurface);
  boardGroup.position.set(-6.5, 3.5, -4.88);
  roomGroup.add(boardGroup);

  // 门口地毯
  const rugMat = new THREE.MeshStandardMaterial({ color: 0xffd6e0, roughness: 0.9, transparent: true, opacity: 0.8 });
  const rug = new THREE.Mesh(new THREE.BoxGeometry(2, 0.02, 4), rugMat);
  rug.position.set(0, 0.01, 0);
  roomGroup.add(rug);

  // 走廊拖鞋
  const slipperMat = new THREE.MeshStandardMaterial({ color: 0xffb6c1, roughness: 0.8 });
  [[-0.3, 0.8], [0.3, -0.6], [0.5, 0.3]].forEach(([sx, sz]) => {
    const slipper = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 0.35), slipperMat);
    slipper.position.set(sx, 0.025, sz);
    roomGroup.add(slipper);
  });
}

// === 多肉盆栽 ===
function buildSucculent(x, y, z) {
  const g = new THREE.Group();
  const potMat = new THREE.MeshStandardMaterial({ color: 0xffcc80, roughness: 0.7 });
  const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 0.12, 8), potMat);
  g.add(pot);
  const soil = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.02, 8), new THREE.MeshStandardMaterial({ color: 0x5c4033 }));
  soil.position.y = 0.07;
  g.add(soil);
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x7ecba1, roughness: 0.6 });
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2;
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), leafMat);
    leaf.position.set(Math.cos(angle) * 0.05, 0.12, Math.sin(angle) * 0.05);
    leaf.scale.set(1, 0.7, 1);
    g.add(leaf);
  }
  const center = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0x9fdfb8 }));
  center.position.y = 0.15;
  g.add(center);
  g.position.set(x, y, z);
  roomGroup.add(g);
}

// === 相框 ===
function buildPhotoFrame(x, y, z) {
  const g = new THREE.Group();
  const frameMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
  const frame = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.05), frameMat);
  g.add(frame);
  const photo = new THREE.Mesh(new THREE.BoxGeometry(0.65, 0.45, 0.04),
    new THREE.MeshStandardMaterial({ color: [0xffd6e0, 0xd6e0ff, 0xffffd0][Math.floor(Math.random()*3)], roughness: 0.5 }));
  photo.position.z = 0.01;
  g.add(photo);
  g.position.set(x, y, z);
  roomGroup.add(g);
}

// === 上床下桌 ===
function buildBeds() {
  dormData.forEach(person => {
    const group = new THREE.Group();
    const x = person.side === 'left' ? -4 + person.index * 4 : 4 - person.index * 4;
    const z = person.side === 'left' ? -2.5 : 2.5;
    const facing = person.side === 'left' ? 1 : -1;

    // 桌子 - 浅木色
    const deskMat = new THREE.MeshStandardMaterial({ color: 0xd4b896, roughness: 0.5 });
    const deskTop = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.1, 2), deskMat);
    deskTop.position.set(0, 1.5, 0);
    deskTop.castShadow = true;
    deskTop.receiveShadow = true;
    group.add(deskTop);
    [[-1.5, -0.9], [1.5, -0.9], [-1.5, 0.9], [1.5, 0.9]].forEach(([lx, lz]) => {
      const leg = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.5, 0.1), deskMat);
      leg.position.set(lx, 0.75, lz);
      group.add(leg);
    });

    // 书架
    const shelfMat = new THREE.MeshStandardMaterial({ color: 0xe0c9a6, roughness: 0.5 });
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.08, 2), shelfMat);
    shelf.position.set(0, 2.8, 0);
    group.add(shelf);
    [-1.6, 0, 1.6].forEach(sx => {
      const side = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.3, 2), shelfMat);
      side.position.set(sx, 2.15, 0);
      group.add(side);
    });

    // 桌面物品
    buildDeskItems(group, person, facing);

    // 桌面小绿植
    buildDeskPlant(group, facing);

    // 床
    const bedMat = new THREE.MeshStandardMaterial({ color: 0xb8945a, roughness: 0.6 });
    const bedBase = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.15, 2), bedMat);
    bedBase.position.set(0, 3.5, 0);
    bedBase.castShadow = true;
    group.add(bedBase);
    // 床垫
    const mattressMat = new THREE.MeshStandardMaterial({ color: 0xfff5f5, roughness: 0.9 });
    const mattress = new THREE.Mesh(new THREE.BoxGeometry(3, 0.2, 1.8), mattressMat);
    mattress.position.set(0, 3.7, 0);
    group.add(mattress);
    // 枕头
    const pillowMat = new THREE.MeshStandardMaterial({ color: person.color, roughness: 0.8 });
    const pillow = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.6), pillowMat);
    pillow.position.set(facing * 0.8, 3.9, 0);
    group.add(pillow);
    // 被子
    const blanketMat = new THREE.MeshStandardMaterial({ color: person.color, roughness: 0.85, transparent: true, opacity: 0.85 });
    const blanket = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.15, 1.6), blanketMat);
    blanket.position.set(-facing * 0.3, 3.85, 0);
    group.add(blanket);

    // 床上玩偶
    buildBedPlushie(group, person, facing);

    // 护栏
    const railMat = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, metalness: 0.4, roughness: 0.4 });
    const rail = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.4, 0.05), railMat);
    rail.position.set(0, 4.0, facing * 1);
    group.add(rail);

    // 梯子
    const ladderMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0, metalness: 0.5, roughness: 0.4 });
    [-0.8, 0.8].forEach(lz => {
      const lr = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2, 8), ladderMat);
      lr.position.set(facing * 1.5, 2.5, lz);
      group.add(lr);
    });
    [1.2, 1.8, 2.4, 3.0].forEach(ly => {
      const step = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.6, 8), ladderMat);
      step.rotation.x = Math.PI / 2;
      step.position.set(facing * 1.5, ly, 0);
      group.add(step);
    });

    // 星星灯串
    buildStarLights(group, person, facing);

    // 台灯
    buildDeskLamp(group, person, facing);

    // 墙上挂钩+包包/衣服
    const hookMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.7, roughness: 0.3 });
    const hook = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.1, 6), hookMat);
    hook.position.set(1.4, 2.5, facing * 0.5);
    group.add(hook);
    const bagMat = new THREE.MeshStandardMaterial({ color: person.color, roughness: 0.7 });
    const bag = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.25, 0.15), bagMat);
    bag.position.set(1.4, 2.3, facing * 0.5);
    group.add(bag);

    group.position.set(x, 0, z);
    if (person.side === 'right') group.rotation.y = Math.PI;
    roomGroup.add(group);
  });
}

// === 桌面小绿植 ===
function buildDeskPlant(group, facing) {
  const g = new THREE.Group();
  const potMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
  const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 0.08, 8), potMat);
  g.add(pot);
  const leafMat = new THREE.MeshStandardMaterial({ color: 0x7ecba1, roughness: 0.6 });
  for (let i = 0; i < 4; i++) {
    const angle = (i / 4) * Math.PI * 2;
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.035, 6, 6), leafMat);
    leaf.position.set(Math.cos(angle) * 0.03, 0.07, Math.sin(angle) * 0.03);
    g.add(leaf);
  }

    Array.from({ length: 8 }, (_, i) => new THREE.Vector3(-1.4 + i * 0.4, 4.2 + Math.sin(i * 0.8) * 0.15, facing * 0.95))

  starGroup.add(wire);
  group.add(starGroup);
}

// === 信息面板 ===
function buildInfoPanel() {
  const panel = document.getElementById('infoPanel');
  dormData.forEach(p => {
    const div = document.createElement('div');
    div.className = 'info-item';
    div.innerHTML = `<span class="dot" style="background:${p.colorHex}"></span>${p.emoji} ${p.name}`;
    div.onclick = () => focusCharacter(p.name);
    panel.appendChild(div);
  });

function focusCharacter(name) {
  const char = characters.find(c => c.userData.name === name);
  if (char) {
    const pos = char.position.clone();
    controls.target.copy(pos);
    camera.position.set(pos.x + 4, pos.y + 4, pos.z + 5);
  }
}

// === 点击人物弹出卡片 ===
function onClick(e) {
  const raycaster = new THREE.Raycaster();
  const mouseVec = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(mouseVec, camera);
  const charMeshes = characters.map(c => c.children).flat();
  const intersects = raycaster.intersectObjects(charMeshes, false);
  if (intersects.length > 0) {
    // 找到属于哪个角色
    let obj = intersects[0].object;
    while (obj.parent && !obj.userData.name) obj = obj.parent;
    if (obj.userData && obj.userData.person) {
      showCard(obj.userData.person);
    }
  }
}

function showCard(person) {
  document.getElementById('cardAvatar').style.background = person.colorHex;
  document.getElementById('cardAvatar').textContent = person.emoji;
  document.getElementById('cardName').textContent = person.name;
  document.getElementById('cardName').style.color = person.colorHex;
  document.getElementById('cardPhrase').textContent = `「${person.catchphrase}」`;
  document.getElementById('cardDesk').textContent = `📋 桌面：${person.deskItems}`;
  document.getElementById('cardPlushie').textContent = `🧸 床头：${person.bedItem}`;
  document.getElementById('charCard').classList.add('show');
}

function closeCard() {
  document.getElementById('charCard').classList.remove('show');
}

// === 日夜切换 ===
function toggleDayNight() {
  isNight = !isNight;
  if (isNight) {
    scene.fog = new THREE.FogExp2(0x2d1f3d, 0.012);
    renderer.toneMappingExposure = 1.0;
    renderer.setClearColor(0x2d1f3d);
    deskLamps.forEach(l => l.intensity = 0.8);
    sunbeams.forEach(b => { b.material.opacity = 0; });
  } else {
    scene.fog = new THREE.FogExp2(0xfff5f0, 0.008);
    renderer.toneMappingExposure = 1.6;
    renderer.setClearColor(0xfff5f0);
    deskLamps.forEach(l => l.intensity = 0.4);
    sunbeams.forEach(b => { b.material.opacity = b.userData.baseOpacity; });
  }
}

function loadMessages() {
  const list = document.getElementById('msgList');
  list.innerHTML = '';
  const saved = JSON.parse(localStorage.getItem('dorm623_msgs') || '[]');
  const all = [...messages, ...saved];
  all.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg-item';
    div.innerHTML = `<span>${m.name}：</span>${m.text}`;
    list.appendChild(div);
  });
  list.scrollTop = list.scrollHeight;
}

function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  const saved = JSON.parse(localStorage.getItem('dorm623_msgs') || '[]');
  saved.push({ name: '双双', text });
  localStorage.setItem('dorm623_msgs', JSON.stringify(saved));
  input.value = '';
  loadMessages();
}

// === 复位 ===
function resetCamera() {
  camera.position.set(12, 10, 14);
  controls.target.set(0, 1, 0);
}

// === 事件 ===
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  // 悬停检测
  const raycaster = new THREE.Raycaster();
  const mouseVec = new THREE.Vector2(mouse.x, mouse.y);
  raycaster.setFromCamera(mouseVec, camera);

  let foundHover = false;
  characters.forEach(char => {
    const charMeshes = char.children.filter(c => c.isMesh);
    const intersects = raycaster.intersectObjects(charMeshes, false);
    const glow = char.userData.glow;
    if (intersects.length > 0) {
      glow.material.opacity = 0.4;
      foundHover = true;
      hoveredChar = char;
      renderer.domElement.style.cursor = 'pointer';
    } else {
      glow.material.opacity = 0;
    }
  });
  if (!foundHover) {
    hoveredChar = null;
    renderer.domElement.style.cursor = 'default';
  }
}

// === 动画循环 ===
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // 爱心飘动
  if (heartsOn) {
    hearts.forEach(h => {
      h.position.y -= h.userData.speedY;
      h.position.x += Math.sin(t + h.userData.phase) * 0.001 + h.userData.speedX;
      h.rotation.x += h.userData.rotSpeed;
      h.rotation.z += h.userData.rotSpeed * 0.5;
      if (h.position.y < -0.5) {
        h.position.y = 5 + Math.random() * 2;
        h.position.x = (Math.random() - 0.5) * 14;
      }
    });
  }

  // 星星灯闪烁
  starLights.forEach(s => {
    const pulse = Math.sin(t * 2 + s.userData.phase) * 0.3 + 0.6;
    s.material.emissiveIntensity = isNight ? pulse * 1.2 : pulse * 0.5;
    s.scale.setScalar(0.8 + pulse * 0.3);
  });

  // 角色头跟随鼠标
  characters.forEach(char => {
    const head = char.userData.headRef;
    const facing = char.userData.facing;
    head.rotation.z = mouse.x * 0.15;
    head.rotation.x = mouse.y * 0.1 * facing;
  });

  // 阳光光束微动
  if (!isNight) {
    sunbeams.forEach((b, i) => {
      b.material.opacity = b.userData.baseOpacity + Math.sin(t * 0.5 + i) * 0.02;
      b.rotation.z = Math.sin(t * 0.3 + i) * 0.02;
    });
  }

  controls.update();
  renderer.render(scene, camera);
}

init();
</script>
